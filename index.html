<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inner Light — Encuentra tu propósito</title>
  <meta name="description" content="Sonríe, Dios te ama. Sos lo más bonito de este mundo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <div class="loader-ring2"></div>
      <span class="loader-text">Inner Light</span>
    </div>
  </div>

  <!-- Music button -->
  <button id="music-btn" title="Toggle music">
    <span id="music-icon">🔊</span>
  </button>

  <!-- Nav -->
  <nav id="navbar">
    <div class="nav-logo">Inner <span>Light</span></div>
  </nav>

  <!-- Hero -->
  <main id="hero">
    <div class="hero-content" id="heroContent">
      <div class="deco-line top-line"></div>

      <div class="message-wrap" id="messageWrap">
        <p class="message-line line-a">
          <span class="word w1" data-dir="left">Sonríe,</span>
          <span class="dot-deco"></span>
          <span class="word gold-word w2" data-dir="top">Dios te ama.</span>
        </p>
        <p class="message-line line-b">
          <span class="word w3" data-dir="bottom">Sos lo más</span>
          <span class="word gradient-word w4" data-dir="explode">bonito</span>
        </p>
        <p class="message-line line-c">
          <span class="word w5" data-dir="right">de</span>
          <span class="word green-word w6" data-dir="right">este mundo.</span>
        </p>
      </div>

      <div class="deco-line bottom-line"></div>
    </div>
  </main>

  <!-- Click burst -->
  <div id="burst-container"></div>

  <!-- Footer — textos juntos -->
  <footer id="footer">
    <div class="footer-texts">
      <p class="sub-tag" id="subTag">Inner Light &nbsp;·&nbsp; Encuentra tu propósito</p>
      <p class="coming-soon">Coming Soon</p>
    </div>
  </footer>

  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="audio/musica.mpeg" type="audio/mpeg" />
  </audio>

  <script src="js/universe.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
